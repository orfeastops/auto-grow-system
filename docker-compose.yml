version: '3.8'

services:
  greenhouse-api:
    build: .
    container_name: greenhouse-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - API_KEY=${API_KEY:-greenhouse2024}
      - NODE_ENV=production
    volumes:
      - ./greenhouse.db:/app/greenhouse.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  greenhouse-data:
